<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RGB Twitch Analytics</title>
    <style>
        .app { display: none !important; }
        .app.authorized { display: grid !important; }

        #loading-screen {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #070f24;
            --brand-navy: #0a1530;
            --brand-navy-mid: #1a2a52;
            --panel: rgba(255,255,255,.04);
            --panel2: rgba(0,0,0,.35);
            --border: rgba(255,255,255,.07);
            --muted: rgba(255,255,255,.4);
            --purple: #5645d4;
            --fuchsia: #7b3ff2;
            --green: #22c55e;
            --primary: #5645d4;
            --on-dark: #ffffff;
            --surface-hover: rgba(255,255,255,.06);
            --card-shadow: rgba(15,15,15,.25) 0 4px 12px 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--on-dark);
            font-family: "Inter", -apple-system, system-ui, "Segoe UI", Helvetica, sans-serif;
            font-feature-settings: "cv02","cv03","cv04","cv11";
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: -320px; right: -320px;
            width: 720px; height: 720px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(86,69,212,.15), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: -280px; left: -280px;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123,63,242,.08), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        button { font: inherit; color: inherit; cursor: pointer; border: 0; }

        .app {
            display: grid;
            grid-template-columns: 256px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            position: sticky; top: 0;
            height: 100vh;
            padding: 20px 16px;
            border-right: 1px solid var(--border);
            background: var(--brand-navy);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .logo, .avatar {
            background: var(--primary);
            box-shadow: 0 12px 40px rgba(86,69,212,.3);
        }

        .logo {
            width: 44px; height: 44px;
            border-radius: 10px;
        }

        .brand h1 { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
        .brand p, .muted { color: var(--muted); }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .nav button {
            width: 100%;
            text-align: left;
            padding: 5px 10px;
            border-radius: 5px;
            background: transparent;
            border: 1px solid transparent;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            transition: all .15s ease;
        }

        .nav button:hover {
            background: var(--surface-hover);
            color: var(--on-dark);
        }

        .nav button.active {
            background: rgba(86,69,212,.2);
            border-color: rgba(86,69,212,.3);
            color: var(--on-dark);
            font-weight: 600;
        }

        .side-card {
            margin-top: auto;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(86,69,212,.2);
            background: linear-gradient(135deg, rgba(86,69,212,.12), rgba(123,63,242,.06));
        }

        .side-card strong {
            display: block;
            font-size: 32px;
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: -.5px;
            color: var(--on-dark);
        }

        .main {
            min-width: 0;
            padding: 32px;
            max-width: 1400px;
        }

        .hidden { display: none !important; }

        .fade {
            animation: fadeIn .3s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: none; }
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 13px;
            border-radius: 8px;
            border: 1px solid rgba(86,69,212,.25);
            background: rgba(86,69,212,.1);
            color: rgba(255,255,255,.75);
            font-size: 13px;
            font-weight: 500;
        }

        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--primary);
        }

        .online { background: var(--green); }

        .hero {
            margin-bottom: 28px;
            padding: 32px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--brand-navy), rgba(26,42,82,.4));
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            top: -120px; right: -60px;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(86,69,212,.18), transparent 65%);
            pointer-events: none;
        }

        .hero-inner {
            display: flex;
            gap: 28px;
            justify-content: space-between;
            align-items: center;
        }

        .hero h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -.7px;
            margin: 12px 0;
            max-width: 560px;
        }

        .lead {
            font-size: 15px;
            line-height: 1.65;
            color: var(--muted);
            max-width: 480px;
        }

        .hero-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--panel);
            font-size: 14px;
            font-weight: 500;
            color: var(--on-dark);
            transition: all .15s ease;
            white-space: nowrap;
        }

        .btn:hover { background: var(--surface-hover); }
        .btn.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .btn.primary:hover { background: #6a58e4; }

        .avatar, .mini-avatar {
            width: 48px; height: 48px;
            border-radius: 10px;
            background: var(--primary);
            flex-shrink: 0;
        }

        .mini-avatar { width: 32px; height: 32px; }

        .profile { }
        .profile.big { padding: 24px; border-radius: 24px; background: var(--panel); border: 1px solid var(--border); }
        .profile-head { display: flex; gap: 14px; align-items: center; margin-bottom: 18px; }
        .profile-head h2 { font-size: 20px; font-weight: 600; }
        .profile-head p { font-size: 13px; }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .metric {
            padding: 14px;
            border-radius: 16px;
            background: var(--panel);
            border: 1px solid var(--border);
            word-break: break-word;
        }

        .metric p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: var(--muted);
        }

        .metric strong {
            display: block;
            font-size: 18px;
            margin-top: 6px;
            letter-spacing: -.3px;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .home-grid { display: grid; gap: 20px; grid-template-columns: 1fr 1fr; }

        .squad-card {
            padding: 24px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--border);
        }

        .squad-card h2 { font-size: 22px; font-weight: 600; }
        .squad-card > p { margin-top: 12px; }

        .creator-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 18px;
            margin-top: 8px;
            border-radius: 16px;
            background: rgba(255,255,255,.04);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: .15s;
        }

        .creator-row:hover {
            background: rgba(255,255,255,.07);
            border-color: rgba(168,85,247,.15);
        }

        .creator-row h3 { font-size: 15px; font-weight: 600; }
        .creator-row p { font-size: 13px; color: var(--muted); margin-top: 2px; }

        .weekly {
            margin-top: 28px;
            padding: 24px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--border);
        }

        .weekly-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .top-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .gap-12 { gap: 12px; }

        .card {
            padding: 24px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--border);
        }

        .page-card {
            padding: 28px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--border);
        }

        .dash-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        .left-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dash-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .content-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--panel);
            font-size: 12px;
            color: var(--muted);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: var(--muted);
            font-weight: 600;
        }

        .table td {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        .table tbody tr { transition: background .15s; }

        .table tbody tr:hover {
            background: rgba(255,255,255,.04);
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .span-4 { grid-column: span 4; }
        .span-8 { grid-column: span 8; }

        .tab-bar {
            display: flex;
            gap: 4px;
            padding: 4px;
            margin-top: 24px;
            margin-bottom: 20px;
            border-radius: 16px;
            background: rgba(255,255,255,.04);
            border: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            background: transparent;
            border: 1px solid transparent;
            transition: .15s;
            cursor: pointer;
        }

        .tab-btn:hover { background: var(--surface-hover); color: var(--on-dark); }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .month-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .month-nav button {
            padding: 8px 16px;
            border-radius: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            font-size: 18px;
            cursor: pointer;
            transition: .15s;
        }

        .month-nav button:hover { background: var(--surface-hover); }

        .chart-wrap {
            padding: 24px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--border);
            margin-top: 28px;
        }

        .chart-wrap canvas { width: 100%; height: 220px; display: block; }

        .modal-overlay {
            position: fixed; inset: 0;
            z-index: 10000;
            background: rgba(7,15,36,.75);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-box {
            background: #0d1225;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .creator-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .metric-grid { grid-template-columns: repeat(2, 1fr) !important; }

        .mod-modal {
            position: fixed; inset: 0;
            z-index: 10000;
            background: rgba(7,15,36,.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .mod-modal-box {
            background: #0d1225;
            border: 1px solid rgba(86,69,212,.3);
            border-radius: 12px;
            padding: 24px;
            max-width: 460px;
            width: 100%;
        }

        .mod-modal-box h2 { font-size: 19px; font-weight: 600; margin-bottom: 6px; }
        .mod-modal-box p { font-size: 14px; line-height: 1.6; color: var(--muted); margin-bottom: 14px; }

        .mod-modal-box label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,.15);
            cursor: pointer;
            margin-bottom: 14px;
            font-size: 14px;
            color: var(--muted);
        }

        .mod-modal-box label input[type=checkbox] {
            width: 16px; height: 16px;
            accent-color: var(--primary);
        }

        .impersonate-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid rgba(250,204,21,.15);
            background: rgba(250,204,21,.05);
            margin-top: 12px;
            font-size: 13px;
            color: #fde047;
        }

        .impersonate-badge button {
            margin-left: auto;
            padding: 7px 12px;
            border-radius: 8px;
            border: 1px solid rgba(250,204,21,.15);
            background: rgba(250,204,21,.08);
            color: #fde047;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s ease;
            white-space: nowrap;
        }

        .impersonate-badge button:hover { background: rgba(250,204,21,.15); }

        ::selection {
            background: rgba(86,69,212,.3);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.14); }

        input, select, textarea {
            outline: none;
            transition: border-color .15s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary) !important;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <aside class="sidebar">
        <div class="brand">
            <div class="logo"></div>
            <div><h1>RGB Analytics</h1><p>Creator Network</p></div>
        </div>
        <nav class="nav" id="mainNav">
            <button class="active" data-page="home">🏠 Главная</button>
            <button data-page="me">👤 Я</button>
            <button data-page="squad" id="squadNavBtn" class="hidden">👥 Мой сквад</button>
            <button data-page="viewers">👁 Зрители</button>
            <button data-page="checkuser">🔍 Проверить</button>
            <button data-page="watching">📺 Что смотрят</button>
            <button data-page="similar">🔍 Похожий контент</button>
        </nav>
        <div class="side-card" id="sidebarClock"><p class="muted">Network Creators</p><strong>6</strong><p class="muted">RGB-Squad + Academy</p></div>
        <button onclick="showBugReport()" style="margin-top:12px;width:100%;padding:12px;border-radius:16px;border:1px solid rgba(250,204,21,.15);background:rgba(250,204,21,.06);color:#fde047;font-size:13px;transition:.18s" onmouseover="this.style.background='rgba(250,204,21,.14)'" onmouseout="this.style.background='rgba(250,204,21,.06)'">🐛 Сообщить об ошибке</button>
        <button onClick="logout()" style="margin-top:12px;width:100%;padding:14px;border-radius:16px;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.08);color:#fca5a5;font-weight:700;transition:.18s" onmouseover="this.style.background='rgba(239,68,68,.18)'" onmouseout="this.style.background='rgba(239,68,68,.08)'">Выйти</button>
    </aside>

    <main class="main">
        <section id="homePage" class="fade"></section>
        <section id="squadPage" class="hidden fade"></section>
        <section id="creatorPage" class="hidden fade"></section>
        <section id="viewersPage" class="hidden fade"></section>
        <section id="checkUserPage" class="hidden fade"></section>
        <section id="infoPage" class="hidden fade"></section>
    </main>
</div>

<div id="bugReportOverlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeBugReport()">
    <div class="modal-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h2>🐛 Сообщить об ошибке</h2>
            <button onclick="closeBugReport()" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);font-size:18px">✕</button>
        </div>
        <p class="muted" style="font-size:13px;margin-bottom:16px">Опиши проблему — мы получим уведомление и исправим</p>
        <div style="display:grid;gap:12px">
            <textarea id="bugDescription" placeholder="Что пошло не так? Опиши подробнее..." style="padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:white;font:inherit;resize:vertical;min-height:100px"></textarea>
            <div>
                <p class="muted" style="font-size:12px;margin-bottom:6px">📷 Скриншот (не обязательно)</p>
                <input type="file" id="bugScreenshot" accept="image/*" style="width:100%;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:var(--muted);font-size:13px">
            </div>
            <div id="bugDeviceInfo" style="display:none"></div>
            <div style="display:flex;gap:10px">
                <button class="btn primary" onclick="submitBugReport()" id="bugSubmitBtn" style="flex:1">📤 Отправить</button>
                <button class="btn" onclick="closeBugReport()">Отмена</button>
            </div>
            <div id="bugReportStatus" class="muted" style="font-size:13px;text-align:center"></div>
        </div>
    </div>
</div>

<div id="authBlock" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 20px; padding: 20px;">
    <div class="logo" style="width: 80px; height: 80px;"></div>
    <h1 style="font-size: 24px;">RGB Analytics</h1>
    <div style="display: flex; flex-direction: column; gap: 10px; width: 340px;">
        <button class="btn primary" onclick="twitchLogin()">Войти через Twitch</button>
    </div>
    <div id="twitchStatus" class="muted" style="font-size: 14px;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"></script>

<script src="/js/config.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/components.js"></script>
<script src="/js/tracker.js"></script>
<script src="/js/pages/main.js"></script>
<script src="/js/pages/admin.js"></script>
<script src="/js/app.js"></script>
<script src="/js/router.js"></script>
</body>
</html>
