<script>
    const TWITCH_CLIENT_ID = 'a26lg52682u7ja24bam0p8lnahs7lg';

    let currentTwitchUser = null;
    let currentUserRole = null;

    function twitchLogin() {
        if (!TWITCH_CLIENT_ID) { document.getElementById('twitchStatus').textContent = 'Twitch Client ID не настроен'; return; }
        const redirect = encodeURIComponent(window.location.href.split('#')[0]);
        window.location.href = 'https://id.twitch.tv/oauth2/authorize?client_id=' + TWITCH_CLIENT_ID + '&redirect_uri=' + redirect + '&response_type=token&scope=';
    }

    function logout() {
        localStorage.removeItem('twitchAccessToken');
        localStorage.removeItem('twitchUserLogin');
        localStorage.removeItem('twitchUserRole');
        currentTwitchUser = null;
        currentUserRole = null;
        document.getElementById('app').classList.remove('authorized');
        document.getElementById('authBlock').style.display = 'flex';
        const p = document.getElementById('adminPanel');
        if (p) p.remove();
        const b = document.getElementById('adminNavBtn');
        if (b) b.remove();
        window.location.hash = '';
    }

    async function checkTwitchAuth() {
        const hash = window.location.hash.substring(1);
        let token = null;
        if (hash) {
            const params = new URLSearchParams(hash);
            token = params.get('access_token');
            if (token) {
                localStorage.setItem('twitchAccessToken', token);
                window.location.hash = '';
            }
        }
        if (!token) {
            token = localStorage.getItem('twitchAccessToken');
        }
        if (!token) return false;

        try {
            const res = await fetch('https://api.twitch.tv/helix/users', {
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Client-Id': TWITCH_CLIENT_ID
                }
            });
            if (!res.ok) {
                localStorage.removeItem('twitchAccessToken');
                return false;
            }
            const data = await res.json();
            const twitchUser = data.data[0];
            if (!twitchUser) return false;

            currentTwitchUser = twitchUser;

            const snap = await db.ref('twitch-users/' + twitchUser.login.toLowerCase()).once('value');
            const userData = snap.val();

            if (!userData) {
                document.getElementById('authBlock').innerHTML = `
                    <div class="logo" style="width: 80px; height: 80px;"></div>
                    <h1 style="font-size: 24px; text-align: center;">Мне кажется<br>Вам сюда нельзя</h1>
                    <p class="muted" style="text-align: center; max-width: 300px;">Ваш Twitch аккаунт <b>${twitchUser.login}</b> не найден в базе RGB Network.</p>
                    <button class="btn" onclick="location.reload()">Назад</button>
                `;
                return false;
            }

            currentUserRole = userData.role || null;
            localStorage.setItem('twitchUserLogin', twitchUser.login);
            localStorage.setItem('twitchUserRole', currentUserRole || '');
            return true;
        } catch (e) {
            console.warn('Twitch API error:', e);
            return false;
        }
    }
</script>

    async function loadUsersList() {
        const el = document.getElementById('userList');
        if (!el) return;
        try {
            const snap = await db.ref('twitch-users').once('value');
            const users = snap.val();
            if (!users) { el.innerHTML = '<p class="muted">Нет пользователей</p>'; return; }
            el.innerHTML = Object.entries(users).map(([login, u]) => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-radius:16px;background:rgba(255,255,255,.055);margin-top:8px">
                    <div><b>${login}</b><p class="muted" style="font-size:13px">${u.displayName || ''}</p></div>
                    <span class="tag" style="${u.role === 'admin' ? 'color:#fbbf24;background:rgba(251,191,36,.13);border-color:rgba(251,191,36,.22)' : u.role === 'squad' ? 'color:#4ade80;background:rgba(74,222,128,.13);border-color:rgba(74,222,128,.22)' : u.role === 'academy' ? 'color:#a855f7;background:rgba(168,85,247,.13);border-color:rgba(168,85,247,.22)' : ''}">${u.role || 'user'}</span>
                </div>`).join('');
        } catch (e) {
            el.innerHTML = '<p class="muted">Ошибка загрузки</p>';
        }
    }

    async function assignRole() {
        const username = document.getElementById('adminUsername').value.trim().toLowerCase();
        const role = document.getElementById('adminRole').value;
        const result = document.getElementById('adminResult');
        if (!username) { result.innerHTML = '<p style="color:#ef4444">Введите Twitch username</p>'; return; }
        try {
            await db.ref('twitch-users/' + username + '/role').set(role || null);
            result.innerHTML = `<p style="color:#4ade80">Роль "${role || 'user'}" назначена для ${username}</p>`;
            document.getElementById('adminUsername').value = '';
            loadUsersList();
        } catch (e) {
            result.innerHTML = '<p style="color:#ef4444">Ошибка: ' + e.message + '</p>';
        }
    }

    const pages = ['homePage', 'squadPage', 'creatorPage', 'infoPage'];
    const allMembers = [...squads.main.members, ...squads.academy.members];

    function show(id) {
        pages.forEach(p => document.getElementById(p).classList.add('hidden'));
        const ap = document.getElementById('adminPanel');
        if (ap) ap.classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function activeNav(page) {
        document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.page === page));
    }

    function metric(label, value, sub = '') {
        return `<article class="metric"><p>${label}</p><strong>${value}</strong>${sub ? `<p style="margin-top:8px">${sub}</p>` : ''}</article>`;
    }

    function renderHome() {
        const weekly = [
            ['Top Avg Viewers', 'K2gemer', '8 avg', '+14%'], ['Most Stream Hours', 'Mak_Kallster', '18.4h', '+6%'],
            ['Best Follower Gain', 'K2gemer', '+26', '+38%'], ['Best Consistency', 'Minilloshka', '5 days', 'stable']
        ];
        document.getElementById('homePage').innerHTML = `
        <div class="hero"><div class="hero-inner"><div><div class="pill"><span class="dot online"></span>RGB Creator Analytics Network</div><h1>Multi-Channel Twitch Intelligence Platform</h1><p class="lead">Выбери подразделение, открой список людей, посмотри краткие метрики и нажми на человека, чтобы открыть dashboard в старом стиле.</p><div class="hero-actions"><button class="btn primary" onclick="openSquad('main')">RGB-Squad</button><button class="btn" onclick="openSquad('academy')">RGB-Academy</button></div></div><div class="profile"><div class="profile-head"><div class="avatar"></div><div><h2>RGB Network</h2><p class="muted">Squad + Academy</p></div></div><div class="metric-grid">${metric('Creators', allMembers.length)}${metric('Total Followers', allMembers.reduce((s, m) => s + m.followers, 0))}${metric('Avg Network Viewers', (allMembers.reduce((s, m) => s + m.avg, 0)).toFixed(1))}${metric('Active Groups', '2')}</div></div></div></div>
        <div class="home-grid">${Object.entries(squads).map(([key, s]) => `<section class="squad-card"><p class="section-label">${s.label}</p><h2>${s.title}</h2>${s.members.map(m => `<div class="creator-row" onclick="openCreator('${m.name}')"><div><h3>${m.name}</h3><p>${m.role} • ${m.avg} avg • ${m.hours}</p></div><button class="btn">Open</button></div>`).join('')}<button class="btn primary" style="margin-top:18px" onclick="openSquad('${key}')">Смотреть всех</button></section>`).join('')}</div>
        <section class="weekly"><div class="weekly-head"><div><p class="muted">Weekly Top Metrics</p><h2>Лучшие показатели за неделю</h2></div><span class="tag">Last 7 days</span></div><div class="top-grid">${weekly.map(w => `<article class="metric"><p>${w[0]}</p><strong>${w[2]}</strong><div style="display:flex;justify-content:space-between;margin-top:14px"><b>${w[1]}</b><span style="color:var(--green)">${w[3]}</span></div></article>`).join('')}</div></section>`;
        show('homePage');
    }

    function openSquad(key) {
        activeNav('squad');
        const s = squads[key];
        document.getElementById('squadPage').innerHTML = `<div class="page-card"><button class="btn" onclick="renderHome();activeNav('squad')">← Назад к подразделениям</button><p class="section-label" style="margin-top:30px">${s.label}</p><h1 style="margin-bottom:28px">${s.title}</h1><div class="table-wrap"><table class="table"><thead><tr><th>#</th><th>Creator</th><th>Watch Time</th><th>Avg Viewers</th><th>Followers</th><th>Growth</th><th>Consistency</th><th>Status</th><th>Language</th></tr></thead><tbody>${s.members.map((m, i) => `<tr onclick="openCreator('${m.name}')"><td>${i + 1}</td><td><div class="creator-cell"><div class="mini-avatar"></div><div><b>${m.name}</b><p class="muted">${m.role}</p></div></div></td><td>${m.hours}</td><td>${m.avg}</td><td>${m.followers}</td><td style="color:var(--green);font-weight:800">${m.gain}</td><td>${m.consistency}</td><td><span class="tag">Affiliate</span></td><td>Russian</td></tr>`).join('')}</tbody></table></div></div>`;
        show('squadPage');
    }

    function openCreator(name) {
        const c = allMembers.find(m => m.name === name);
        if (!c) return;
        document.getElementById('creatorPage').innerHTML = `<div class="dash-grid"><div class="left-stack"><div class="profile big"><button class="btn" onclick="renderHome();activeNav('squad')">← Назад</button><div class="profile-head" style="margin-top:24px"><div class="avatar"></div><div><h2>${c.name}</h2><p class="muted">${c.role}</p></div></div><div class="metric-grid">${metric('Followers', c.followers)}${metric('Avg Viewers', c.avg)}${metric('Watch Hours', c.watch)}${metric('Momentum', c.momentum)}</div></div><div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:18px"><div><h2>Retention</h2><p class="muted">Returning Viewer Rate</p></div><b style="color:var(--green)">${c.retention}%</b></div><div class="bar"><span style="--w:${c.retention}%"></span></div><div class="metric" style="margin-top:20px"><p>Community Density</p><strong>${c.density}</strong></div></div></div><main class="dashboard-main card"><div class="dash-head"><div><h1>Growth Dashboard</h1><p class="muted">Twitch analytics & forecasting system</p></div><div><p class="muted">Live Status</p><b style="color:var(--green)">${c.status}</b></div></div><div class="analytics-grid"><section class="card span-8"><div style="display:flex;justify-content:space-between"><div><h2>Viewer Momentum</h2><p class="muted">Organic growth acceleration</p></div><b style="color:var(--green);font-size:28px">${c.momentum}</b></div><canvas id="chart" class="chart"></canvas></section><section class="card span-4"><h2>Forecast</h2><p class="muted">Projected avg viewers</p>${c.forecast.map(f => `<div class="content-item"><span>${f[0]}</span><b>${f[1]}</b></div>`).join('')}</section><section class="card span-6"><h2>Top Content</h2>${c.content.map(x => `<div class="content-item"><span>${x[0]}</span><b>${x[1]}</b></div><div class="bar"><span style="--w:${x[2]}%"></span></div>`).join('')}</section><section class="card span-6"><h2>Stream Consistency</h2><p class="muted">Frequency and schedule stability</p><div class="top-grid" style="grid-template-columns:repeat(2,1fr);margin-top:18px">${metric('Weekly Hours', c.hours)}${metric('Active Days', c.consistency)}${metric('Follower Gain', c.gain)}${metric('Avg Viewers', c.avg)}</div></section></div></main></div>`;
        show('creatorPage');
        drawChart();
    }

    function drawChart() {
        const canvas = document.getElementById('chart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const r = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = r.width * dpr;
        canvas.height = r.height * dpr;
        ctx.scale(dpr, dpr);
        const p = 34, w = r.width - p * 2, h = r.height - p * 2;
        ctx.strokeStyle = 'rgba(255,255,255,.07)';
        for (let i = 0; i < 4; i++) {
            const y = p + h / 3 * i;
            ctx.beginPath();
            ctx.moveTo(p, y);
            ctx.lineTo(p + w, y);
            ctx.stroke();
        }
        const pts = [[p, p + h * .78], [p + w * .25, p + h * .7], [p + w * .45, p + h * .45], [p + w * .7, p + h * .32], [p + w, p + h * .12]];
        const gr = ctx.createLinearGradient(0, p, 0, p + h);
        gr.addColorStop(0, 'rgba(168,85,247,.45)');
        gr.addColorStop(1, 'rgba(168,85,247,0)');
        ctx.beginPath();
        pts.forEach((pt, i) => i ? ctx.lineTo(pt[0], pt[1]) : ctx.moveTo(pt[0], pt[1]));
        ctx.lineTo(p + w, p + h);
        ctx.lineTo(p, p + h);
        ctx.closePath();
        ctx.fillStyle = gr;
        ctx.fill();
        ctx.beginPath();
        pts.forEach((pt, i) => i ? ctx.lineTo(pt[0], pt[1]) : ctx.moveTo(pt[0], pt[1]));
        ctx.strokeStyle = '#a855f7';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
        ['Aug', 'Sep', 'Oct', 'Nov'].forEach((m, i) => {
            ctx.fillStyle = 'rgba(255,255,255,.45)';
            ctx.font = '14px system-ui';
            ctx.fillText(m, p + i * (w / 3), p + h + 24);
        });
    }

    function renderInfo(type) {
        const map = {
            viewers: ['Зрители которые смотрят', 'Сводка по возвращаемости, активности чата и ядру аудитории.', [['Core Viewers', '10–15', 'постоянное ядро'], ['Community Density', '62%', 'активность чата'], ['Returning Viewers', '48%', 'возврат за неделю']]],
            watching: ['Что смотрят', 'Игры и категории, которые дают лучший watch time.', [['Minecraft', '166h', 'основной контент'], ['Just Chatting', '24h', 'лучшее вовлечение'], ['PEAK', '15h', 'эксперименты']]],
            similar: ['Похожий контент', 'Контентные направления, похожие на текущую стратегию RGB.', [['Minecraft SMP', 'High', 'сильное совпадение'], ['Cozy Gaming', 'Medium', 'хорошая совместимость'], ['Community Events', 'High', 'рост удержания']]]
        };
        const d = map[type];
        document.getElementById('infoPage').innerHTML = `<div class="page-card"><h1>${d[0]}</h1><p class="lead">${d[1]}</p><div class="top-grid" style="margin-top:26px">${d[2].map(x => metric(x[0], x[1], x[2])).join('')}</div></div>`;
        show('infoPage');
    }

    document.querySelectorAll('.nav button').forEach(b => b.addEventListener('click', () => {
        activeNav(b.dataset.page);
        if (b.dataset.page === 'me') openCreator('K2gemer'); else if (b.dataset.page === 'squad') renderHome(); else renderInfo(b.dataset.page);
    }));
    window.addEventListener('resize', drawChart);
</script>
</body>
</html>
