<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RGB Twitch Analytics</title>
    <style>
        .app {
            display: none!important;
        }
        .app.authorized {
            display: grid!important;
        }
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:#07070a; --panel:rgba(255,255,255,.035); --panel2:rgba(0,0,0,.25);
            --border:rgba(255,255,255,.09); --muted:rgba(255,255,255,.45);
            --purple:#a855f7; --fuchsia:#d946ef; --green:#4ade80;
        }
        body {
            min-height:100vh; background:var(--bg); color:#fff;
            font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            overflow-x:hidden;
        }
        body:before, body:after { content:""; position:fixed; width:560px; height:560px; border-radius:999px; filter:blur(150px); pointer-events:none; z-index:-1; }
        body:before { top:-240px; left:-240px; background:rgba(168,85,247,.22); }
        body:after { right:-260px; bottom:-260px; background:rgba(217,70,239,.13); }
        button { font:inherit; color:inherit; cursor:pointer; border:0; }
        .app { display:grid; grid-template-columns:260px 1fr; min-height:100vh; }
        .sidebar { position:sticky; top:0; height:100vh; padding:28px 22px; border-right:1px solid rgba(255,255,255,.06); background:rgba(0,0,0,.24); backdrop-filter:blur(24px); }
        .brand { display:flex; align-items:center; gap:14px; margin-bottom:42px; }
        .logo,.avatar { background:linear-gradient(135deg,var(--purple),var(--fuchsia)); box-shadow:0 28px 90px rgba(168,85,247,.25); }
        .logo { width:56px; height:56px; border-radius:50%; }
        .brand h1 { font-size:19px; } .brand p,.muted { color:var(--muted); }
        .nav { display:grid; gap:12px; }
        .nav button { width:100%; text-align:left; padding:16px 17px; border-radius:17px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06); transition:.18s; }
        .nav button:hover,.nav button.active { background:rgba(168,85,247,.24); border-color:rgba(168,85,247,.35); }
        .side-card { margin-top:46px; padding:20px; border-radius:24px; border:1px solid rgba(168,85,247,.22); background:linear-gradient(135deg,rgba(168,85,247,.18),rgba(217,70,239,.08)); }
        .side-card strong { display:block; font-size:38px; margin-top:7px; }
        .main { min-width:0; padding:34px; }
        .hidden { display:none!important; }
        .fade { animation:fade .28s ease both; } @keyframes fade { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none} }
        .pill { display:inline-flex; align-items:center; gap:10px; padding:9px 15px; border-radius:999px; border:1px solid rgba(168,85,247,.25); background:rgba(168,85,247,.1); color:rgba(255,255,255,.72); font-size:14px; }
        .dot { width:8px; height:8px; border-radius:50%; background:var(--purple); } .online{background:var(--green)}
        .hero { margin-bottom:28px; padding:34px; border-radius:34px; border:1px solid var(--border); background:var(--panel); backdrop-filter:blur(24px); position:relative; overflow:hidden; }
        .hero:after { content:""; position:absolute; right:-100px; top:-100px; width:430px; height:430px; border-radius:999px; background:rgba(168,85,247,.12); filter:blur(110px); }
        .hero-inner { position:relative; z-index:1; display:grid; grid-template-columns:1fr 330px; gap:30px; align-items:start; }
        h1 { font-size:clamp(42px,5vw,66px); line-height:1.03; letter-spacing:-.055em; font-weight:950; }
        .lead { margin-top:22px; max-width:760px; color:var(--muted); font-size:18px; line-height:1.65; }
        .hero-actions { display:flex; gap:14px; flex-wrap:wrap; margin-top:30px; }
        .btn { padding:13px 18px; border-radius:16px; border:1px solid rgba(168,85,247,.28); background:rgba(168,85,247,.18); transition:.18s; }
        .btn:hover { background:rgba(168,85,247,.3); transform:translateY(-1px); }
        .btn.primary { padding:15px 22px; border:0; background:linear-gradient(90deg,var(--purple),var(--fuchsia)); font-weight:800; box-shadow:0 22px 70px rgba(168,85,247,.22); }
        .profile,.card { border:1px solid var(--border); background:var(--panel); backdrop-filter:blur(24px); border-radius:28px; }
        .profile { padding:22px; background:rgba(0,0,0,.28); }
        .profile-head { display:flex; align-items:center; gap:15px; margin-bottom:17px; }
        .avatar { width:74px; height:74px; border-radius:50%; }
        .metric-grid { display:grid; gap:12px; }
        .metric { padding:16px; border-radius:19px; border:1px solid rgba(255,255,255,.06); background:rgba(0,0,0,.23); }
        .metric p { color:var(--muted); font-size:14px; } .metric strong { display:block; margin-top:7px; font-size:30px; line-height:1; }
        .home-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:24px; }
        .squad-card { padding:30px; border-radius:32px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); transition:.2s; }
        .squad-card:hover { transform:translateY(-3px); border-color:rgba(168,85,247,.35); }
        .section-label { color:#d8b4fe; font-size:13px; letter-spacing:.18em; font-weight:800; margin-bottom:12px; }
        .squad-card h2 { font-size:46px; letter-spacing:-.04em; margin-bottom:24px; }
        .creator-row { display:grid; grid-template-columns:1fr auto; gap:15px; align-items:center; padding:18px; border-radius:22px; border:1px solid rgba(255,255,255,.08); background:rgba(0,0,0,.24); margin-top:12px; transition:.18s; }
        .creator-row:hover { background:rgba(255,255,255,.065); }
        .creator-row h3 { font-size:20px; } .creator-row p { color:var(--muted); margin-top:4px; font-size:14px; }
        .weekly { margin-top:26px; padding:28px; border-radius:30px; border:1px solid var(--border); background:var(--panel); }
        .weekly-head { display:flex; justify-content:space-between; align-items:center; gap:20px; margin-bottom:22px; }
        .weekly h2 { font-size:30px; margin-top:6px; }
        .top-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:16px; }
        .table-wrap { overflow-x:auto; border-radius:28px; border:1px solid var(--border); background:rgba(0,0,0,.22); }
        .table-wrap::-webkit-scrollbar { height:6px; }
        .table-wrap::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); border-radius:3px; }
        .table { width:100%; border-collapse:collapse; min-width:700px; }
        .table th { text-align:left; padding:17px 18px; color:var(--muted); font-size:13px; background:rgba(255,255,255,.035); border-bottom:1px solid var(--border); }
        .table td { padding:18px; border-bottom:1px solid rgba(255,255,255,.07); }
        .table tr { transition:.16s; cursor:pointer; } .table tbody tr:hover { background:rgba(255,255,255,.045); }
        .creator-cell { display:flex; align-items:center; gap:13px; }
        .mini-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--purple),var(--fuchsia)); }
        .tag { display:inline-flex; padding:6px 10px; border-radius:999px; color:#d8b4fe; background:rgba(168,85,247,.13); border:1px solid rgba(168,85,247,.22); font-size:13px; }
        .dash-grid { display:grid; grid-template-columns:320px 1fr; gap:24px; }
        @media(max-width:960px){ .dash-grid{grid-template-columns:1fr} }
        .left-stack { display:grid; gap:22px; }
        .profile.big { padding:25px; }
        .dashboard-main { padding:30px; }
        .dash-head { display:flex; justify-content:space-between; align-items:start; gap:20px; margin-bottom:26px; }
        .dash-head h1 { font-size:44px; }
        .analytics-grid { display:grid; grid-template-columns:repeat(12,minmax(0,1fr)); gap:20px; }
        .span-8 { grid-column:span 8; } .span-4 { grid-column:span 4; } .span-6 { grid-column:span 6; }
        .card { padding:24px; }
        .card h2 { font-size:24px; margin-bottom:6px; }
        .chart { width:100%; height:230px; margin-top:18px; }
        .bar { height:12px; border-radius:999px; background:rgba(255,255,255,.09); overflow:hidden; }
        .bar span { display:block; height:100%; border-radius:inherit; width:var(--w); background:linear-gradient(90deg,var(--purple),var(--fuchsia)); }
        .content-item { display:flex; justify-content:space-between; align-items:center; padding:15px; border-radius:17px; background:rgba(255,255,255,.055); margin-top:11px; }
        .page-card { padding:32px; border-radius:32px; border:1px solid var(--border); background:var(--panel); }
        .tab-bar { display:flex; gap:4px; padding:0; margin-bottom:0; border-bottom:1px solid var(--border); }
        .tab-btn { padding:12px 20px; font-size:14px; font-weight:600; border:none; background:transparent; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; margin-bottom:-1px; }
        .tab-btn:hover { color:rgba(255,255,255,.7); }
        .tab-btn.active { color:white; border-bottom-color:#a855f7; }
        .month-nav { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
        .month-nav h3 { font-size:20px; }
        .month-nav button { padding:8px 14px; border-radius:12px; border:1px solid var(--border); background:var(--panel); color:white; font-size:14px; cursor:pointer; transition:.2s; }
        .month-nav button:hover { background:rgba(168,85,247,.2); border-color:rgba(168,85,247,.35); }
        .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px; }
        .modal-box { background:#0d0d12;border:1px solid var(--border);border-radius:24px;padding:28px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto; }
        .modal-box h2 { font-size:20px;margin-bottom:6px; }
        .modal-box textarea { width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:white;font:inherit;resize:vertical;min-height:80px; }
        .modal-box input[type=file] { width:100%;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:var(--muted);font-size:13px; }
        .device-info { font-size:11px;color:var(--muted);padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid var(--border);max-height:120px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.5; }
        @media(max-width:1150px){ .app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.hero-inner,.home-grid{grid-template-columns:1fr}.top-grid{grid-template-columns:repeat(2,1fr)}.span-8,.span-4,.span-6{grid-column:span 12} }
        @media(max-width:760px){ .main{padding:20px}.top-grid{grid-template-columns:1fr}.analytics-grid{grid-template-columns:1fr}.span-8,.span-4,.span-6{grid-column:auto}.dash-head,.weekly-head{flex-direction:column;align-items:flex-start}.metric-grid{grid-template-columns:repeat(2,1fr)!important} }
    </style>
</head>
<body>
<div class="app" id="app">
    <aside class="sidebar">
        <div class="brand"><div class="logo"></div><div><h1>RGB Analytics</h1><p>Creator Network</p></div></div>
        <nav class="nav" id="mainNav">
            <button class="active" data-page="home">🏠 Главная</button>

        <button onclick="showBugReport()" style="margin-top:12px;width:100%;padding:12px;border-radius:16px;border:1px solid rgba(250,204,21,.15);background:rgba(250,204,21,.06);color:#fde047;font-size:13px;transition:.18s" onmouseover="this.style.background='rgba(250,204,21,.14)'" onmouseout="this.style.background='rgba(250,204,21,.06)'">🐛 Сообщить об ошибке</button>

    <main class="main">

</div>

            <textarea id="bugDescription" placeholder="Что пошло не так? Опиши подробнее..." style="padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:white;font:inherit;resize:vertical;min-height:100px"></textarea>

    <div class="logo" style="width: 80px; height: 80px;"></div>
    <h1 style="font-size: 24px;">RGB Analytics</h1>
    <div style="display: flex; flex-direction: column; gap: 10px; width: 340px;">
        <button class="btn primary" onclick="twitchLogin()">Войти через Twitch</button>

</div>

<script>
    const TWITCH_CLIENT_ID = 'a26lg52682u7ja24bam0p8lnahs7lg';
    const TG_BOT_TOKEN = '8708472197:AAGqoPzMM8tL5cadNPj-z7DPIEEBEXxXXTQ';
    let _tgChatIds = [];
    async function getTgChatIds() {
        if (_tgChatIds.length) return _tgChatIds;
        try {
            const snap = await db.ref('config/tg-chat-id').once('value');
            const raw = snap.val() || '';
            _tgChatIds = raw.split(/[\s,;]+/).filter(Boolean);
            return _tgChatIds;
        } catch { return []; }
    }

    let currentTwitchUser = null;
    let currentUserRoles = {};
    let cachedUsers = null;
    let cachedUsersTime = 0;
    const CACHE_TTL = 20000;
    let currentOpenCreator = null;
    let _creatorFollowersCache = {};
    let currentViewerProfileId = null;

    let _botConfig = null;
    let _botConfigTime = 0;
    const BOT_CACHE_TTL = 60000;
    async function getBotConfig() {
        if (_botConfig && Date.now() - _botConfigTime < BOT_CACHE_TTL) return _botConfig;
        try {
            const snap = await db.ref('config/bot').once('value');
            _botConfig = snap.val() || {};
            _botConfigTime = Date.now();
        } catch (e) { _botConfig = {}; }
        return _botConfig;
    }
    async function getBotHeaders() {
        const cfg = await getBotConfig();
        if (cfg.token) return { 'Authorization': 'Bearer ' + cfg.token, 'Client-Id': cfg.clientId || TWITCH_CLIENT_ID };
        return null;
    }
    async function getBotWorkerUrl() {
        const cfg = await getBotConfig();
        return cfg.workerUrl || null;
    }

    let _botInfoCache = null;
    let _botInfoTime = 0;
    const BOT_INFO_TTL = 120000;
    async function getWorkerBotInfo() {
        const workerUrl = await getBotWorkerUrl();
        if (!workerUrl) return null;
        if (_botInfoCache && Date.now() - _botInfoTime < BOT_INFO_TTL) return _botInfoCache;
        try {
            const res = await fetch(workerUrl + '/api/bot-info');
            if (!res.ok) return null;
            const d = await res.json();
            if (!d.token) return null;
            _botInfoCache = d;
            _botInfoTime = Date.now();
            return d;
        } catch { return null; }
    }

    async function getBotToken() {
        const info = await getWorkerBotInfo();
        if (info) return { token: info.token, id: info.id, login: info.login, display: info.display, clientId: info.client_id };
        const cfg = await getBotConfig();
        if (cfg.token) return { token: cfg.token, id: null, login: null, display: null, clientId: cfg.clientId };
        return null;
    }

    let _ipCache = null;
    async function getIP() {
        if (_ipCache) return _ipCache;
        try {
            const r = await fetch('https://api.ipify.org?format=json');
            const d = await r.json();
            _ipCache = d.ip;
            return _ipCache;
        } catch { return 'unknown'; }
    }

    function getErrorLocation(error) {
        if (!error) return 'unknown:?:?';
        const stack = error.stack || '';
        const match = stack.match(/(https?:\/\/[^\s]+):(\d+):(\d+)/) || stack.match(/at\s+(?:.*?\()?(https?:\/\/[^\s]+):(\d+):(\d+)/);
        if (match) return `${match[1].split('/').pop()}:${match[2]}:${match[3]}`;
        return 'unknown:?:?';
    }

    async function sendErrorToTelegram(error, context = '') {
        if (!TG_BOT_TOKEN || !TG_CHAT_IDS.length) return;
        try {
            const ip = await getIP();
            const loc = getErrorLocation(error);
            const msg = error?.message || String(error || 'Script error');
            const time = new Date().toISOString().replace('T', ' ').slice(0, 19);
            const user = currentTwitchUser?.login || 'гость';
            const url = window.location.hostname + window.location.pathname;

            const text = [
                '❌ ОШИБКА НА САЙТЕ',
                '',
                msg.length > 100 ? msg.slice(0, 100) + '…' : msg,
                '📍 ' + loc,
                '🕐 ' + time,
                '👤 ' + user,
                '🌐 IP: ' + ip,
                '🔗 ' + url
            ].join('\n');

            for (const chatId of TG_CHAT_IDS) {
                await fetch('https://api.telegram.org/bot' + TG_BOT_TOKEN + '/sendMessage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text })
                });
            }
        } catch (e) {
            console.warn('Telegram error report failed:', e);
        }
    }

    window.onerror = function (msg, source, line, col, error) {
        sendErrorToTelegram(error || msg);
    };
    window.addEventListener('unhandledrejection', function (e) {
        sendErrorToTelegram(e.reason);
    });

    function twitchLogin() {
        if (!TWITCH_CLIENT_ID) { document.getElementById('twitchStatus').textContent = 'Twitch Client ID не настроен'; return; }
        const redirect = encodeURIComponent(window.location.href.split('#')[0]);
        window.location.href = 'https://id.twitch.tv/oauth2/authorize?client_id=' + TWITCH_CLIENT_ID + '&redirect_uri=' + redirect + '&response_type=token&scope=moderator:read:followers+moderator:read:chatters&force_verify=true';
    }

    function logout() {
        localStorage.removeItem('twitchAccessToken');
        localStorage.removeItem('twitchUserLogin');
        localStorage.removeItem('twitchUserRoles');
        localStorage.removeItem('twitchUserDisplayName');
        localStorage.removeItem('twitchUserAvatar');
        localStorage.removeItem('twitchUserCacheTime');
        localStorage.removeItem('twitchUserId');
        currentTwitchUser = null;
        currentUserRoles = {};
        cachedUsers = null;
        document.getElementById('app').classList.remove('authorized');
        document.getElementById('authBlock').style.display = 'flex';
        const p = document.getElementById('adminPanel');
        if (p) p.remove();
        const b = document.getElementById('adminNavBtn');
        if (b) b.remove();
        updateSquadNavButton();
        window.location.hash = '';
    }

    function restoreSession() {
        const login = localStorage.getItem('twitchUserLogin');
        const roles = localStorage.getItem('twitchUserRoles');
        const displayName = localStorage.getItem('twitchUserDisplayName');
        const avatar = localStorage.getItem('twitchUserAvatar');
        const id = localStorage.getItem('twitchUserId');
        if (login && roles) {
            currentUserRoles = JSON.parse(roles) || {};
            currentTwitchUser = {
                login,
                display_name: displayName || login,
                profile_image_url: avatar || '',
                description: '',
                id: id || ''
            };
            return true;
        }
        return false;
    }

    function saveSession(twitchUser, roles) {
        localStorage.setItem('twitchUserLogin', twitchUser.login);
        localStorage.setItem('twitchUserRoles', JSON.stringify(roles));
        localStorage.setItem('twitchUserDisplayName', twitchUser.display_name);
        localStorage.setItem('twitchUserAvatar', twitchUser.profile_image_url);
        localStorage.setItem('twitchUserId', twitchUser.id);
    }

    async function checkTwitchAuth() {
        const hash = window.location.hash.substring(1);
        let token = null;
        if (hash) {
            const params = new URLSearchParams(hash);
            token = params.get('access_token');
            if (token) {
                localStorage.setItem('twitchAccessToken', token);
                window.location.hash = '';
            }
        }
        if (!token) {
            token = localStorage.getItem('twitchAccessToken');
        }
        if (!token) return false;

        try {
            const res = await fetch('https://api.twitch.tv/helix/users', {
                headers: { 'Authorization': 'Bearer ' + token, 'Client-Id': TWITCH_CLIENT_ID }
            });
            if (!res.ok) {
                localStorage.removeItem('twitchAccessToken');
                return false;
            }
            const data = await res.json();
            const twitchUser = data.data[0];
            if (!twitchUser) return false;

            currentTwitchUser = twitchUser;

            const snap = await db.ref('twitch-users/' + twitchUser.login.toLowerCase()).once('value');
            const userData = snap.val();

            if (!userData) {
                document.getElementById('authBlock').innerHTML = `
                    <div class="logo" style="width: 80px; height: 80px;"></div>
                    <h1 style="font-size: 24px; text-align: center;">Мне кажется<br>Вам сюда нельзя</h1>
                    <p class="muted" style="text-align: center; max-width: 300px;">Ваш Twitch аккаунт <b>${twitchUser.login}</b> не найден в базе RGB Network.</p>
                    <button class="btn" onclick="location.reload()">Назад</button>
                `;
                return false;
            }

            currentUserRoles = userData.roles || {};
            if (userData.role && !currentUserRoles[userData.role]) {
                currentUserRoles[userData.role] = true;
            }
            saveSession(twitchUser, currentUserRoles);

            await db.ref('twitch-users/' + twitchUser.login.toLowerCase()).update({
                twitchId: twitchUser.id,
                displayName: twitchUser.display_name,
                profileImageUrl: twitchUser.profile_image_url,
                description: twitchUser.description || '',
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });

            return true;
        } catch (e) {
            console.warn('Twitch API error:', e);
            return false;
        }
    }
</script>

<script>
    async function initApp() {
        try {
            const app = document.getElementById('app');
            const authBlock = document.getElementById('authBlock');
            const hasHash = window.location.hash.includes('access_token');
            const hasToken = !!localStorage.getItem('twitchAccessToken');

            // Показываем "загрузка" при возврате с Twitch
            if (hasHash) {
                authBlock.innerHTML = '<div class="logo" style="width:80px;height:80px;margin:0 auto"></div><p class="muted" style="text-align:center;margin-top:20px">Авторизация…</p>';
            }

            // Instant restore from cache — no loading flash
            if (!hasHash && restoreSession() && hasToken) {
                app.classList.add('authorized');
                authBlock.style.display = 'none';
                renderSidebarUser();
                renderHome();
                renderAdminButton();
                updateSquadNavButton();
            }

            // Full check in background: verify token + fetch fresh data
            const ok = await checkTwitchAuth();
            if (ok) {
                app.classList.add('authorized');
                authBlock.style.display = 'none';
                await renderHome();
                renderAdminButton();
                renderSidebarUser();
                updateSquadNavButton();
            } else if (!restoreSession() || !hasToken) {
                app.classList.remove('authorized');
                authBlock.style.display = 'flex';
            }
        } catch (e) {
            console.error('initApp error:', e);
        }
    }
    initApp();


    function isAdmin() {
        return currentUserRoles && currentUserRoles.admin === true;
    }

    function hasRole(role) {
        return currentUserRoles && currentUserRoles[role] === true;
    }

    function rolesDisplay() {
        const labels = [];
        if (currentUserRoles?.admin) labels.push('Admin');
        if (currentUserRoles?.squad) labels.push('Squad');
        if (currentUserRoles?.academy) labels.push('Academy');
        return labels.join(', ') || 'user';
    }

    function analyzeQuality(followers, avgViewers, viewerCountNow) {
        const v = viewerCountNow || avgViewers || 0;
        const f = followers || 0;
        if (!v && !f) return { label: 'Нет данных (офлайн)', color: '#888', score: 0, flags: ['💤 Стример не в эфире'] };
        const flags = [];
        let score = 50;

        if (v > 100) {
            flags.push('🔥 Высокая активность (' + v + ' зр.)');
            score = 80;
        } else if (v > 30) {
            flags.push('✅ Хорошая аудитория (' + v + ' зр.)');
            score = 65;
        } else if (v > 10) {
            flags.push('🟢 Средняя аудитория (' + v + ' зр.)');
            score = 50;
        } else if (v > 3) {
            flags.push('🟡 Мало зрителей (' + v + ' зр.)');
            score = 30;
        } else if (v > 0) {
            flags.push('🔴 Очень мало зрителей (' + v + ' зр.)');
            score = 15;
        }

        if (f > 0) {
            flags.push('📊 Фоловеров: ' + f.toLocaleString('ru-RU'));
            if (v > 0) {
                const ratio = Math.round(f / v);
                if (ratio > 100) flags.push('🟡 Фоловеров намного больше зрителей (' + ratio + ':1)');
                else if (ratio > 30) flags.push('🟢 Среднее вовлечение (' + ratio + ' фол/зр)');
                else flags.push('🔥 Хорошее вовлечение (' + ratio + ' фол/зр)');
            }
        }
        if (v > 0) flags.push('📊 Прямой эфир: ' + v + ' зр.');

        const label = score >= 65 ? '✅ Хорошо' : score >= 45 ? '🟢 Средне' : score >= 25 ? '🟡 Слабо' : '🔴 Критично';
        return { label, color: score >= 65 ? '#4ade80' : score >= 45 ? '#facc15' : '#ef4444', score, flags };
    }

    // ─── Viewer Analysis System ───────────────────────────────────────
    const viewerTracker = {
        viewers: {},
        history: {},
        _interval: null,
        _broadcasterId: null,
        _broadcasterLogin: null,

        async start(broadcasterId, broadcasterLogin) {
            this._broadcasterId = broadcasterId;
            this._broadcasterLogin = broadcasterLogin;
            this.viewers = {};
            if (this._interval) clearInterval(this._interval);
            // Load historical viewer data from Firebase for global persistence
            try {
                const snap = await db.ref('viewer-history/' + broadcasterLogin).once('value');
                const history = snap.val() || {};
                const now = Date.now();
                for (const vid in history) {
                    const h = history[vid];
                    this.viewers[vid] = {
                        userId: vid,
                        login: h.login || '',
                        displayName: h.displayName || h.login || '',
                        profileImageUrl: h.profileImageUrl || '',
                        createdAt: h.createdAt || null,
                        description: h.description || '',
                        firstSeen: h.firstSeen || now,
                        lastSeen: h.lastSeen || now,
                        totalSessions: 1,
                        _fromHistory: true
                    };
                }
            } catch (e) { console.warn('Failed to load viewer history:', e); }
            this._poll();
        },

        stop() {
            if (this._interval) { clearInterval(this._interval); this._interval = null; }
            this._broadcasterId = null;
            this._broadcasterLogin = null;
        },

        async _poll() {
            const id = this._broadcasterId;
            const login = this._broadcasterLogin;
            if (!id) return;

            const token = localStorage.getItem('twitchAccessToken');
            const modId = currentTwitchUser?.id;
            if (!token || !modId) return;

            const botToken = await getBotToken();
            let chattersRes;
            try {
                const now = Date.now();
                // 1) Try bot as moderator
                if (botToken && botToken.id) {
                    chattersRes = await fetch('https://api.twitch.tv/helix/chat/chatters?broadcaster_id=' + id + '&moderator_id=' + botToken.id + '&first=100', {
                        headers: { 'Authorization': 'Bearer ' + botToken.token, 'Client-Id': botToken.clientId || TWITCH_CLIENT_ID }
                    });
                }
                // 2) Fallback: viewer is the broadcaster themselves → can see chatters
                if ((!chattersRes || !chattersRes.ok) && modId === id) {
                    chattersRes = await fetch('https://api.twitch.tv/helix/chat/chatters?broadcaster_id=' + id + '&moderator_id=' + id + '&first=100', {
                        headers: { 'Authorization': 'Bearer ' + token, 'Client-Id': TWITCH_CLIENT_ID }
                    });
                }
                if (!chattersRes || !chattersRes.ok) return;
                const data = await chattersRes.json();
                const currentIds = new Set();

                // Fetch user info for chatters (no mod scope needed)
                const chatters = data.data || [];
                const ids = chatters.map(c => c.user_id).filter(Boolean);
                let userMap = {};
                if (ids.length > 0) {
                    const uRes = await fetch(
                        'https://api.twitch.tv/helix/users?id=' + ids.join('&id='),
                        { headers: { 'Authorization': 'Bearer ' + token, 'Client-Id': TWITCH_CLIENT_ID } }
                    );
                    if (uRes.ok) { const uData = await uRes.json(); (uData.data || []).forEach(u => { userMap[u.id] = u; }); }
                }

                for (const c of chatters) {
                    const vid = c.user_id;
                    currentIds.add(vid);
                    const u = userMap[vid] || {};
                    if (!this.viewers[vid]) {
                        this.viewers[vid] = {
                            userId: vid,
                            login: c.user_login || u.login,
                            displayName: u.display_name || c.user_name || c.user_login,
                            profileImageUrl: u.profile_image_url || '',
                            createdAt: u.created_at || null,
                            description: u.description || '',
                            firstSeen: now,
                            lastSeen: now,
                            totalSessions: 1
                        };
                    } else {
                        this.viewers[vid].lastSeen = now;
                        this.viewers[vid].displayName = u.display_name || this.viewers[vid].displayName;
                        this.viewers[vid].profileImageUrl = u.profile_image_url || this.viewers[vid].profileImageUrl;
                        this.viewers[vid].createdAt = u.created_at || this.viewers[vid].createdAt;
                        this.viewers[vid].description = u.description || this.viewers[vid].description;
                    }
                }

                // Mark viewers who left
                for (const vid in this.viewers) {
                    if (!currentIds.has(vid)) {
                        const v = this.viewers[vid];
                        if (v.lastSeen === v.firstSeen) {
                            v.lastSeen = now - 15000;
                        }
                    }
                }

                // Update the viewer table if visible
                const ve = document.getElementById('viewerAnalysis');
                if (ve && !ve.classList.contains('hidden')) {
                    this.renderTable();
                }

                // Save to Firebase every 30s
                if (!this._lastSaveTime || Date.now() - this._lastSaveTime > 30000) {
                    this._lastSaveTime = now;
                    this._saveToFirebase();
                }
            } catch (e) {}
        },

        _saveToFirebase() {
            const channelLogin = this._broadcasterLogin;
            if (!channelLogin || Object.keys(this.viewers).length === 0) return;
            (async () => {
                try {
                    const vids = Object.keys(this.viewers);
                    const [channelSnap, allSnap, streamSnap] = await Promise.all([
                        db.ref('viewer-history/' + channelLogin).once('value'),
                        db.ref('all-viewers').once('value'),
                        db.ref('stream-cache/' + channelLogin).once('value')
                    ]);
                    const existingChannel = channelSnap.val() || {};
                    const existingAll = allSnap.val() || {};
                    const cachedStream = streamSnap.val() || {};
                    let currentGame = cachedStream.game || '';
                    // Try to get current game from tracker context
                    if (!currentGame && this._broadcasterId) {
                        try {
                            const bt = await getBotToken();
                            const hdrs = bt ? { 'Authorization': 'Bearer ' + bt.token, 'Client-Id': TWITCH_CLIENT_ID } : (localStorage.getItem('twitchAccessToken') ? { 'Authorization': 'Bearer ' + localStorage.getItem('twitchAccessToken'), 'Client-Id': TWITCH_CLIENT_ID } : null);
                            if (hdrs) {
                                const stRes = await fetch('https://api.twitch.tv/helix/streams?user_id=' + this._broadcasterId, { headers: hdrs });
                                const stData = await stRes.json();
                                if (stData.data && stData.data[0]) {
                                    currentGame = stData.data[0].game_name;
                                }
                            }
                        } catch (e) {}
                    }
                    const updates = {};
                    for (const vid of vids) {
                        const v = this.viewers[vid];
                        if (!v.login) continue;
                        const eCh = existingChannel[vid] || {};
                        const eAll = existingAll[vid] || {};
                        const eChCh = (eAll.channels && eAll.channels[channelLogin]) || {};
                        const chFirst = Math.min(v.firstSeen, eCh.firstSeen || v.firstSeen);
                        const chLast = Math.max(v.lastSeen, eCh.lastSeen || v.lastSeen);
                        const allFirst = Math.min(v.firstSeen, eAll.firstSeen || v.firstSeen);
                        const allLast = Math.max(v.lastSeen, eAll.lastSeen || 0);
                        const cp = 'viewer-history/' + channelLogin + '/' + vid + '/';
                        updates[cp + 'login'] = v.login;
                        updates[cp + 'displayName'] = v.displayName || v.login;
                        updates[cp + 'profileImageUrl'] = v.profileImageUrl || '';
                        updates[cp + 'createdAt'] = v.createdAt || '';
                        updates[cp + 'description'] = v.description || '';
                        updates[cp + 'firstSeen'] = chFirst;
                        updates[cp + 'lastSeen'] = chLast;
                        const ap = 'all-viewers/' + vid + '/';
                        updates[ap + 'login'] = v.login;
                        updates[ap + 'displayName'] = v.displayName || v.login;
                        updates[ap + 'profileImageUrl'] = v.profileImageUrl || '';
                        updates[ap + 'createdAt'] = v.createdAt || '';
                        updates[ap + 'description'] = v.description || '';
                        updates[ap + 'firstSeen'] = allFirst;
                        updates[ap + 'lastSeen'] = allLast;
                        updates[ap + 'channels/' + channelLogin + '/firstSeen'] = Math.min(v.firstSeen, eChCh.firstSeen || v.firstSeen);
                        updates[ap + 'channels/' + channelLogin + '/lastSeen'] = chLast;
                        if (currentGame) {
                            const eCat = (eAll.categories && eAll.categories[currentGame]) || {};
                            updates[ap + 'categories/' + currentGame + '/count'] = (eCat.count || 0) + 1;
                            updates[ap + 'categories/' + currentGame + '/lastSeen'] = Date.now();
                        }
                    }
                    // Cache current stream game
                    if (currentGame) {
                        updates['stream-cache/' + channelLogin + '/game'] = currentGame;
                        updates['stream-cache/' + channelLogin + '/updatedAt'] = Date.now();
                    }
                    await db.ref().update(updates);

                    // Save 15-min viewer snapshot
                    const now = Date.now();
                    if (!this._lastChunkTime || now - this._lastChunkTime > 900000) {
                        this._lastChunkTime = now;
                        const d = new Date();
                        const dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                        const viewerCount = Object.keys(this.viewers).length;
                        try {
                            await db.ref('stream-chunks/' + channelLogin + '/' + dateStr + '/' + now).set({
                                viewers: viewerCount,
                                game: currentGame || 'unknown',
                                updatedAt: now
                            });
                        } catch (e) { console.warn('Chunk save error:', e); }
                    }
                } catch (e) {
                    console.warn('Firebase viewer save error:', e);
                }
            })();
        },

        analyzeViewer(v) {
            if (!v) return { score: 0, level: '✅ Обычный', reasons: ['Нет данных'], color: '#4ade80' };
            const reasons = [];
            let score = 0;

            if (v.createdAt) {
                const days = (Date.now() - new Date(v.createdAt).getTime()) / 86400000;
                if (days < 2) { score += 40; reasons.push('🔴 Аккаунт создан ' + Math.floor(days) + 'д назад (< 2 дней)'); }
                else if (days < 7) { score += 20; reasons.push('🟡 Аккаунт создан ' + Math.floor(days) + 'д назад (< недели)'); }
                else if (days < 30) { score += 10; reasons.push('🟢 Аккаунт свежий (' + Math.floor(days) + 'д)'); }
                else if (days < 90) { score += 3; reasons.push('🟢 Аккаунту < 3 мес (' + Math.floor(days) + 'д)'); }
                else { score -= 10; reasons.push('✅ Аккаунт зрелый (' + Math.floor(days) + 'д)'); }
            } else {
                score += 10;
                reasons.push('🟡 Нет даты создания');
            }

            if (v.login) {
                const n = v.login.toLowerCase();
                if (/^[a-z]\d{8,}$/.test(n)) { score += 20; reasons.push('🟡 Имя похоже на авто-генерацию (буква + 8+ цифр)'); }
                if (/^[a-z0-9]{16,}$/.test(n)) { score += 15; reasons.push('🟡 Очень длинное имя (' + n.length + ' симв.)'); }
                if (/(.)\1{6,}/.test(n)) { score += 10; reasons.push('🟡 Много повторяющихся символов в имени'); }
            }

            const duration = v.lastSeen - v.firstSeen;
            const durMin = Math.floor(duration / 60000);
            if (durMin < 1) { score += 5; reasons.push('🟡 Сидит менее минуты'); }
            else if (durMin < 5) { reasons.push('🟢 Сидит ' + durMin + ' мин'); }
            else if (durMin < 30) { reasons.push('✅ Сидит ' + durMin + ' мин'); }
            else { score -= 5; reasons.push('🔥 Сидит ' + durMin + ' мин (постоянный)'); }

            const totalScore = Math.max(0, Math.min(100, score));
            const level = totalScore >= 50 ? '⚠️ Подозрительный' : totalScore >= 25 ? '🔍 Обратить внимание' : '✅ Обычный';
            const color = totalScore >= 50 ? '#ef4444' : totalScore >= 25 ? '#facc15' : '#4ade80';
            return { score: totalScore, level, reasons, color };
        },

        getViewers() {
            return Object.values(this.viewers)
                .map(v => ({ ...v, analysis: this.analyzeViewer(v) }))
                .sort((a, b) => b.analysis.score - a.analysis.score);
        },

        renderTable() {
            const container = document.getElementById('viewerAnalysis');
            if (!container) return;
            const list = this.getViewers();
            const suspicious = list.filter(v => v.analysis.score >= 25);
            container.innerHTML = `
            <div class="page-card" style="margin-top:24px">
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px">
                    <div><h2 style="font-size:24px">👁 Анализ зрителей</h2>
                    <p class="muted">Всего в чате: ${list.length} ${suspicious.length ? '| ⚠️ Подозрительных: ' + suspicious.length : ''}</p></div>
                    <button class="btn" onclick="viewerTracker._poll();viewerTracker.renderTable()" style="padding:8px 14px;font-size:13px">🔄 Обновить</button>
                </div>
                ${list.length ? `
                <div style="overflow-x:auto;border-radius:20px;border:1px solid var(--border)">
                    <table class="table" style="min-width:900px">
                        <thead><tr>
                            <th>Зритель</th>
                            <th>Время в чате</th>
                            <th>Аккаунт</th>
                            <th>Описание</th>
                            <th>Статус</th>
                            <th>Риск</th>
                            <th></th>
                        </tr></thead>
                        <tbody>${list.map(v => {
                            const dur = v.lastSeen - v.firstSeen;
                            const durStr = dur < 60000 ? '<1 мин' : Math.floor(dur / 60000) + ' мин';
                            const daysOld = v.createdAt ? Math.floor((Date.now() - new Date(v.createdAt).getTime()) / 86400000) : '—';
                            return `<tr onclick="openViewerProfile('${(v.userId || v.login || '').replace(/'/g, "\\'")}')" style="cursor:pointer">
                                <td><div class="creator-cell">
                                    ${v.profileImageUrl ? '<img class="mini-avatar" src="' + v.profileImageUrl + '" style="object-fit:cover;border-radius:50%">' : '<div class="mini-avatar"></div>'}
                                    <div><b>${v.displayName || v.login}</b><p class="muted">@${v.login || ''}</p></div>
                                </div></td>
                                <td>${durStr}</td>
                                <td style="font-size:13px">${daysOld !== '—' ? daysOld + ' дн.' : '—'}</td>
                                <td style="font-size:13px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)">${(v.description || '—').slice(0, 40)}</td>
                                <td><span style="color:${v.analysis.score >= 50 ? '#ef4444' : v.analysis.score >= 25 ? '#facc15' : '#4ade80'};font-size:13px">${v.analysis.level.split(' ')[0]}</span></td>
                                <td><div style="display:flex;align-items:center;gap:8px">
                                    <div style="flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;min-width:60px">
                                        <div style="width:${v.analysis.score}%;height:100%;border-radius:3px;background:${v.analysis.color}"></div>
                                    </div>
                                    <span style="font-size:12px;color:${v.analysis.color};white-space:nowrap">${v.analysis.score}%</span>
                                </div></td>
                                <td><span style="color:var(--purple);font-size:12px">→</span></td>
                            </tr>`;
                        }).join('')}</tbody>
                    </table>
                </div>
                ${suspicious.length ? '<div style="margin-top:16px;padding:14px 18px;border-radius:16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2)"><p style="color:#fca5a5;font-weight:700;margin-bottom:8px">⚠️ Подозрительные зрители</p>' + suspicious.map(v => '<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer" onclick="openViewerProfile(\'' + (v.userId || v.login || '').replace(/'/g, "\\'") + '\')"><span><b>' + (v.displayName || v.login) + '</b> <span class="muted">— ' + v.analysis.reasons.slice(0, 2).join(', ') + '</span></span><span style="color:' + v.analysis.color + ';font-weight:700">' + v.analysis.score + '%</span></div>').join('') + '</div>' : ''}
                ` : '<p class="muted" style="padding:20px;text-align:center">Нет зрителей в чате. Стример не в эфире или нет доступа к чату.</p>'}
            </div>`;
        }
    };

    function renderAdminPanel() {
        let panel = document.getElementById('adminPanel');
        if (!panel) {
            panel = document.createElement('section');
            panel.id = 'adminPanel';
            panel.className = 'hidden fade';
            document.querySelector('.main').appendChild(panel);
        }
        panel.innerHTML = `
        <div class="page-card">
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px">
                <span style="background:linear-gradient(135deg,#f59e0b,#ef4444);width:12px;height:12px;border-radius:50%;display:inline-block"></span>
                <h1>Admin Panel</h1>
            </div>
            <p class="muted" style="margin-bottom:24px">Управление ролями пользователей. Отметь нужные роли для пользователя.</p>
            <div style="display:grid;gap:14px;margin-bottom:24px">

    function authBot() {
        const input = document.getElementById('botWorkerUrlInput').value.trim();
        if (!input) { document.getElementById('botConfigStatus').innerHTML = '❌ Сначала введи URL воркера'; return; }
        let url = input;
        if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
        url = url.replace(/\/$/, '') + '/api/auth';
        window.open(url, '_blank');
    }

    async function checkBotStatus() {
        const status = document.getElementById('botConfigStatus');
        const workerUrl = document.getElementById('botWorkerUrlInput').value.trim();
        if (!workerUrl) { status.innerHTML = '❌ Сначала сохрани URL воркера'; return; }
        try {
            const res = await fetch(workerUrl + '/api/status');
            if (!res.ok) { status.innerHTML = '❌ Воркер недоступен (' + res.status + ')'; return; }
            const d = await res.json();
            if (d.configured) {
                const left = d.expires_in > 3600 ? Math.floor(d.expires_in / 3600) + 'ч' : Math.floor(d.expires_in / 60) + 'мин';
                status.innerHTML = '✅ Бот: <b>' + (d.bot_display || d.bot_login) + '</b> | токен живет ' + left + ' | автообновление каждые 3ч';
            } else {
                status.innerHTML = '🟡 Воркер работает, но бот не авторизован. Нажми "Авторизовать бота"';
            }
        } catch (e) {
            status.innerHTML = '❌ Ошибка соединения: ' + e.message;
        }
    }

    async function testBotToken() {
        const status = document.getElementById('botConfigStatus');
        const token = document.getElementById('botTokenInput').value.trim();
        const clientId = document.getElementById('botClientIdInput').value.trim() || TWITCH_CLIENT_ID;
        if (!token) { status.innerHTML = '❌ Введи токен'; return; }
        try {
            const res = await fetch('https://api.twitch.tv/helix/users', {
                headers: { 'Authorization': 'Bearer ' + token, 'Client-Id': clientId }
            });
            if (!res.ok) {
                const err = await res.json();
                status.innerHTML = '❌ Ошибка ' + res.status + ': ' + (err.message || 'токен невалидный');
                return;
            }
            const data = await res.json();
            const user = data.data && data.data[0];
            status.innerHTML = '✅ Токен валидный. Бот: <b>' + (user ? user.login + ' (' + user.display_name + ')' : 'неизвестный пользователь') + '</b>';
        } catch (e) {
            status.innerHTML = '❌ Ошибка соединения: ' + e.message;
        }
    }

    async function importSullyGnomeCSV() {
        const result = document.getElementById('sgImportResult');
        const loginInput = document.getElementById('sgLoginInput');
        const fileInput = document.getElementById('sgCsvInput');
        const login = loginInput.value.trim().toLowerCase();
        if (!login) { result.innerHTML = '❌ Введи Twitch логин'; return; }
        if (!fileInput.files.length) { result.innerHTML = '❌ Выбери CSV файл'; return; }

        const text = await fileInput.files[0].text();
        const lines = text.trim().split('\n').slice(1);
        let imported = 0, errors = 0;
        result.innerHTML = '⏳ Импортирую ' + lines.length + ' стримов для @' + login + '...';

        for (const line of lines) {
            const vals = [];
            let cur = '', inQ = false;
            for (const ch of line) {
                if (ch === '"') { inQ = !inQ; continue; }
                if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; continue; }
                cur += ch;
            }
            vals.push(cur.trim());

            const dateRaw = vals[1] || '';
            const streamUrl = vals[2] || '';
            const streamMins = parseInt(vals[3]) || 0;
            const watchMins = parseInt(vals[4]) || 0;
            const avg = parseInt(vals[5]) || 0;
            const peak = parseInt(vals[6]) || 0;
            const followers = parseInt(vals[7]) || 0;
            const games = vals[9] || '';

            const months = { 'January':1,'February':2,'March':3,'April':4,'May':5,'June':6,'July':7,'August':8,'September':9,'October':10,'November':11,'December':12 };
            const parts = dateRaw.split(' ');
            const day = parseInt(parts[1]);
            const month = months[parts[2]];
            const year = parseInt(parts[3]);
            const time = parts[4] ? parts[4].split(':') : [0,0];
            if (!day || !month || !year) { errors++; continue; }
            const startDate = new Date(Date.UTC(year, month - 1, day, parseInt(time[0]), parseInt(time[1])));
            const dateStr = year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
            const chunkTs = startDate.getTime();

            const chunk = {
                viewers: avg, peakViewers: peak, watchTimeMins: watchMins,
                followersGained: followers, game: games.split(',')[0].trim(), games,
                title: 'SullyGnome import', durationMins: streamMins,
                updatedAt: chunkTs, source: 'sullygnome-csv'
            };

            try {
                await db.ref('stream-chunks/' + login + '/' + dateStr + '/' + chunkTs).set(chunk);
                imported++;
                result.innerHTML = '⏳ Импортировано ' + imported + '/' + lines.length + ' (' + dateStr + ' ' + streamMins + 'мин)...';
            } catch (e) {
                errors++;
            }
        }
        result.innerHTML = '✅ Импортировано ' + imported + ' стримов для @' + login + (errors ? ', ошибок: ' + errors : '');
        loginInput.value = '';
        fileInput.value = '';
    }

                if (roles.squad) tags.push('<span class="tag" style="color:#4ade80;background:rgba(74,222,128,.13);border-color:rgba(74,222,128,.22)">Squad</span>');

                    <div><b>${login}</b><p class="muted" style="font-size:13px">${u.displayName || ''}</p></div>

        return `<article class="metric"><p>${label}</p><strong>${value}</strong>${sub ? `<p style="margin-top:8px">${sub}</p>` : ''}</article>`;
    }

    function findMemberData(name) {
        return allMembers.find(m => m.name.toLowerCase() === name.toLowerCase());
    }

    function calculateHP(memberData) {
        if (!memberData) return null;

        const avgScore = Math.min(Math.round((memberData.avg || 0) * 10), 100);
        const retentionScore = Math.min(Math.round(memberData.retention || 0), 100);
        const freqNum = parseInt(memberData.consistency || '0');
        const freqScore = Math.min(Math.round(freqNum * 15), 100);
        const gainNum = parseInt((memberData.gain || '0').replace('+', ''));
        const gainScore = Math.min(Math.round(gainNum * 3), 100);
        const whNum = parseInt(memberData.watch || '0');
        const whScore = Math.min(Math.round(Math.sqrt(whNum) * 2.5), 100);
        const densityScore = Math.min(Math.round(parseInt(memberData.density || '0')), 100);

        const hp = Math.round(
            avgScore * 0.30 +
            retentionScore * 0.20 +
            freqScore * 0.15 +
            gainScore * 0.15 +
            whScore * 0.10 +
            densityScore * 0.10
        );

        return Math.max(0, Math.min(100, hp));
    }

    function hpInterpretation(score) {
        if (score === null || score === undefined) return { level: 'Нет данных', color: '#888' };
        if (score >= 90) return { level: 'Потенциальный большой канал', color: '#a855f7' };
        if (score >= 80) return { level: 'Высокий шанс популярности', color: '#4ade80' };
        if (score >= 65) return { level: 'Сильный рост', color: '#22d3ee' };
        if (score >= 50) return { level: 'Стабильный канал', color: '#facc15' };
        if (score >= 30) return { level: 'Слабый рост', color: '#fb923c' };
        return { level: 'Канал почти мертв', color: '#ef4444' };
    }

    function hpBreakdown(memberData) {
        if (!memberData) return '';
        const items = [
            { label: 'Avg Viewers', raw: memberData.avg, score: Math.min(Math.round((memberData.avg || 0) * 10), 100) },
            { label: 'Retention', raw: memberData.retention + '%', score: Math.min(Math.round(memberData.retention || 0), 100) },
            { label: 'Frequency', raw: memberData.consistency, score: Math.min(Math.round(parseInt(memberData.consistency || '0') * 15), 100) },
            { label: 'Followers Growth', raw: memberData.gain, score: Math.min(Math.round(parseInt((memberData.gain || '0').replace('+', '')) * 3), 100) },
            { label: 'Watch Hours', raw: memberData.watch, score: Math.min(Math.round(Math.sqrt(parseInt(memberData.watch || '0')) * 2.5), 100) },
            { label: 'Community Density', raw: memberData.density, score: Math.min(Math.round(parseInt(memberData.density || '0')), 100) }
        ];
        return '<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;line-height:1.8">' +
            items.map(i =>
                '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">' +
                '<span style="color:var(--muted)">' + i.label + '</span>' +
                '<div style="flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden;max-width:60px">' +
                '<div style="width:' + i.score + '%;height:100%;border-radius:2px;background:var(--purple)"></div></div>' +
                '<span style="color:#fff;font-weight:600">' + i.score + '</span>' +
                '</div>'
            ).join('') + '</div>';
    }

    async function loadTwitchUsers(force) {
        const now = Date.now();
        if (!force && cachedUsers && (now - cachedUsersTime < CACHE_TTL)) {
            return cachedUsers;
        }
        const token = localStorage.getItem('twitchAccessToken');
        const snap = await db.ref('twitch-users').once('value');
        const all = snap.val();
        if (!all) { cachedUsers = []; cachedUsersTime = now; return []; }
        const logins = Object.keys(all);
        const members = [];

        if (token && logins.length > 0) {
            try {
                const url = 'https://api.twitch.tv/helix/users?login=' + logins.join('&login=');
                const res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token, 'Client-Id': TWITCH_CLIENT_ID }
                });
                const data = await res.json();
                const userMap = {};
                data.data.forEach(u => { userMap[u.login.toLowerCase()] = u; });

                const ids = data.data.map(u => u.id).filter(Boolean);
                let streamMap = {};
                if (ids.length > 0) {
                    const stRes = await fetch('https://api.twitch.tv/helix/streams?user_id=' + ids.join('&user_id='), {
                        headers: { 'Authorization': 'Bearer ' + token, 'Client-Id': TWITCH_CLIENT_ID }
                    });
                    const stData = await stRes.json();
                    stData.data.forEach(s => { streamMap[s.user_id] = s; });
                }

                for (const login of logins) {
                    const u = userMap[login];
                    const s = u ? streamMap[u.id] : null;
                    members.push({
                        login, roles: all[login].roles || {},
                        displayName: u ? u.display_name : all[login].displayName || login,
                        profileImageUrl: u ? u.profile_image_url : all[login].profileImageUrl || '',
                        description: u ? u.description : all[login].description || '',
                        twitchId: u ? u.id : all[login].twitchId,
                        stream: s, isLive: !!s, viewers: s ? s.viewer_count : 0,
                        gameName: s ? s.game_name : '', streamTitle: s ? s.title : '',
                        followers: 0
                    });
                }

                // Fetch followers for all members in parallel
                const modId = currentTwitchUser?.id || '';
                const botToken = await getBotToken();
                if (modId) {
                    await Promise.all(members.filter(m => m.twitchId).map(async (m) => {
                        try {
                            const fModId = botToken?.id || modId;
                            const fHdrs = botToken ? { 'Authorization': 'Bearer ' + botToken.token, 'Client-Id': botToken.clientId || TWITCH_CLIENT_ID } : { 'Authorization': 'Bearer ' + token, 'Client-Id': TWITCH_CLIENT_ID };
                            const fRes = await fetch('https://api.twitch.tv/helix/channels/followers?broadcaster_id=' + m.twitchId + '&moderator_id=' + fModId + '&first=1', { headers: fHdrs });
                            if (fRes.ok) { const fData = await fRes.json(); m.followers = fData.total || 0; }
                        } catch (e) {}
                    }));
                }
            } catch (e) {
                console.warn('Twitch fetch error:', e);
                for (const login of logins) {
                    members.push({
                        login, roles: all[login].roles || {},
                        displayName: all[login].displayName || login,
                        profileImageUrl: all[login].profileImageUrl || '',
                        description: all[login].description || '',
                        twitchId: all[login].twitchId,
                        stream: null, isLive: false, viewers: 0, gameName: '', streamTitle: '',
                        followers: 0
                    });
                }
            }
        } else {
            for (const login of logins) {
                members.push({
                    login, roles: all[login].roles || {},
                    displayName: all[login].displayName || login,
                    profileImageUrl: all[login].profileImageUrl || '',
                    description: all[login].description || '',
                    twitchId: all[login].twitchId,
                    stream: null, isLive: false, viewers: 0, gameName: '', streamTitle: '',
                    followers: 0
                });
            }
        }
        cachedUsers = members;
        cachedUsersTime = Date.now();
        return members;
    }

    function drawChart() {
        const canvas = document.getElementById('chart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const r = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = r.width * dpr;
        canvas.height = r.height * dpr;
        ctx.scale(dpr, dpr);
        const p = 34, w = r.width - p * 2, h = r.height - p * 2;
        ctx.strokeStyle = 'rgba(255,255,255,.07)';
        for (let i = 0; i < 4; i++) {
            const y = p + h / 3 * i;
            ctx.beginPath();
            ctx.moveTo(p, y);
            ctx.lineTo(p + w, y);
            ctx.stroke();
        }
        const pts = [[p, p + h * .78], [p + w * .25, p + h * .7], [p + w * .45, p + h * .45], [p + w * .7, p + h * .32], [p + w, p + h * .12]];
        const gr = ctx.createLinearGradient(0, p, 0, p + h);
        gr.addColorStop(0, 'rgba(168,85,247,.45)');
        gr.addColorStop(1, 'rgba(168,85,247,0)');
        ctx.beginPath();
        pts.forEach((pt, i) => i ? ctx.lineTo(pt[0], pt[1]) : ctx.moveTo(pt[0], pt[1]));
        ctx.lineTo(p + w, p + h);
        ctx.lineTo(p, p + h);
        ctx.closePath();
        ctx.fillStyle = gr;
        ctx.fill();
        ctx.beginPath();
        pts.forEach((pt, i) => i ? ctx.lineTo(pt[0], pt[1]) : ctx.moveTo(pt[0], pt[1]));
        ctx.strokeStyle = '#a855f7';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
        ['Aug', 'Sep', 'Oct', 'Nov'].forEach((m, i) => {
            ctx.fillStyle = 'rgba(255,255,255,.45)';
            ctx.font = '14px system-ui';
            ctx.fillText(m, p + i * (w / 3), p + h + 24);
        });
    }

    async function doLocalhostLogin() {

            const userSnap = await db.ref('twitch-users/' + login).once('value');

                currentUserRoles[userData.role] = true;

    function renderTrackerStats(login, userId) {
        setActiveTab(login, 'tracker');
        viewerTracker.stop();
        const ve = document.getElementById('viewerAnalysis');
        if (ve) ve.style.display = 'none';
        const calId = 'streamCalendarContainer_' + login.replace(/[^a-z0-9]/gi, '');
        const cal = document.getElementById(calId);
        if (cal) { cal.style.display = 'none'; }
        const safe = login.replace(/[^a-z0-9]/gi, '');
        const container = document.getElementById('trackerContainer_' + safe);
        if (!container) return;
        container.style.display = 'block';
        container.innerHTML = '<p class="muted" style="padding:20px;text-align:center">📊 Загрузка...</p>';
        container.scrollIntoView({ behavior: 'smooth', block: 'start' });

        // Fetch TwitchTracker via Worker endpoint (proxied + cached)
        const getTt = async () => {
            const workerUrl = await getBotWorkerUrl();
            if (workerUrl) {
                try {
                    const r = await fetch(workerUrl + '/api/tracker-summary?login=' + encodeURIComponent(login));
                    if (r.ok) return r.json();
                } catch {}
            }
            // Fallback: direct (might be CORS-blocked)
            try {
                const r = await fetch('https://twitchtracker.com/api/channels/summary/' + login);
                if (r.ok) return r.json();
            } catch {}
            return null;
        };
        // Use cached followers from openCreator (same as main page)
        const totalFollowersLive = _creatorFollowersCache[login] || 0;
        Promise.all([
            getTt(),
            db.ref('stream-chunks/' + login).once('value').then(s => s.val() || {})
        ]).then(([ttData, chunks]) => {
            const ttKeys = ttData && typeof ttData === 'object' ? Object.keys(ttData) : [];

            let csvStreams = 0, snapDays = 0, totalMinutes = 0, totalWatchTime = 0, totalFollowers = 0;
            let sumAvgViewers = 0, maxPeakViewers = 0, snapViewerSamples = 0, snapViewerSum = 0, snapPeak = 0;
            const allGames = new Set();
            const allDates = new Set();
            const csvDates = new Set();
            for (const dateStr of Object.keys(chunks)) {
                const dayChunks = chunks[dateStr];
                let daySnapViewers = [], daySnapPeak = 0;
                for (const ts of Object.keys(dayChunks)) {
                    const c = dayChunks[ts];
                    if (c.source === 'sullygnome-csv') {
                        csvStreams++;
                        totalMinutes += c.durationMins || 0;
                        totalWatchTime += c.watchTimeMins || 0;
                        totalFollowers += c.followersGained || 0;
                        sumAvgViewers += c.viewers || 0;
                        if ((c.peakViewers || 0) > maxPeakViewers) maxPeakViewers = c.peakViewers;
                        if (c.games) c.games.split(',').forEach(g => allGames.add(g.trim()));
                        csvDates.add(dateStr);
                    } else {
                        // Worker/frontend 15-min snapshots
                        daySnapViewers.push(c.viewers || 0);
                        if ((c.viewers || 0) > daySnapPeak) daySnapPeak = c.viewers || 0;
                        totalMinutes += c.durationMins || 15;
                        totalWatchTime += c.watchTimeMins || 0;
                        totalFollowers += c.followersGained || 0;
                        if (c.game) allGames.add(c.game);
                    }
                }
                if (daySnapViewers.length) {
                    snapDays++;
                    snapViewerSum += daySnapViewers.reduce((a, b) => a + b, 0);
                    snapViewerSamples += daySnapViewers.length;
                    if (daySnapPeak > snapPeak) snapPeak = daySnapPeak;
                    allDates.add(dateStr);
                }
                if (csvDates.has(dateStr)) allDates.add(dateStr);
            }
            // Merge stats from both sources
            if (!csvStreams && snapViewerSamples) {
                maxPeakViewers = snapPeak;
                sumAvgViewers = snapViewerSum;
            }
            const totalStreams = csvStreams || snapDays;
            const sgAvgViewers = totalStreams ? Math.round(sumAvgViewers / totalStreams) : snapViewerSamples ? Math.round(snapViewerSum / snapViewerSamples) : 0;
            const sgHours = Math.floor(totalMinutes / 60);
            const sgMins = totalMinutes % 60;

            let html = '<div class="page-card" style="margin-top:24px">';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px">';
            html += '<h2 style="font-size:24px">📊 Общие данные: @' + login + '</h2>';
            html += '<button class="btn" onclick="renderTrackerStats(\'' + login + '\', \'' + userId + '\')" style="padding:8px 14px;font-size:13px">🔄 Обновить</button>';
            html += '</div>';

            if (ttKeys.length) {
                const ttm = ttData.minutes_streamed || 0;
                const tth = Math.floor(ttm / 60);
                const ttmi = ttm % 60;
                html += '<h3 style="font-size:16px;margin-bottom:12px">📈 TwitchTracker — 30 дней</h3>';
                html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;padding:16px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid var(--border)">';
                html += '<div class="metric"><p>📈 Средние</p><strong style="font-size:22px;color:#a855f7">' + (ttData.avg_viewers || 0) + '</strong></div>';
                html += '<div class="metric"><p>🔥 Пик</p><strong style="font-size:22px;color:#a855f7">' + (ttData.max_viewers || 0) + '</strong></div>';
                html += '<div class="metric"><p>⏱ Эфир</p><strong style="font-size:22px">' + tth + 'ч ' + ttmi + 'м</strong></div>';
                html += '<div class="metric"><p>👁 Часов просмотра</p><strong style="font-size:22px">' + (ttData.hours_watched || 0).toLocaleString('ru-RU') + '</strong></div>';
                const newFollowers30 = ttData.followers || 0;
                html += '<div class="metric"><p>📊 Новые фоловеры (30д)</p><strong style="font-size:22px">+' + newFollowers30.toLocaleString('ru-RU') + '</strong></div>';
                html += '<div class="metric"><p>👥 Всего фоловеров</p><strong style="font-size:22px;color:#4ade80">' + totalFollowersLive.toLocaleString('ru-RU') + '</strong></div>';
                if (ttData.rank) html += '<div class="metric"><p>🏆 Рейтинг</p><strong style="font-size:22px">#' + ttData.rank + '</strong></div>';
                html += '</div>';
            } else {
                html += '<h3 style="font-size:16px;margin-bottom:12px">📈 TwitchTracker</h3>';
                html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;padding:16px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid var(--border)">';
                html += '<div class="metric"><p>👥 Всего фоловеров</p><strong style="font-size:22px;color:#4ade80">' + totalFollowersLive.toLocaleString('ru-RU') + '</strong></div>';
                html += '<div class="metric" style="grid-column:1/-1"><p class="muted">TwitchTracker временно недоступен</p></div>';
                html += '</div>';
            }

            if (totalStreams > 0) {
                html += '<h3 style="font-size:16px;margin-bottom:12px">📊 SullyGnome — импортированные стримы</h3>';
                html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;padding:16px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid var(--border)">';
                html += '<div class="metric"><p>🎬 Стримов</p><strong style="font-size:22px">' + totalStreams + '</strong></div>';
                html += '<div class="metric"><p>📅 Дней</p><strong style="font-size:22px">' + allDates.size + '</strong></div>';
                html += '<div class="metric"><p>⏱ В эфире</p><strong style="font-size:22px">' + sgHours + 'ч ' + sgMins + 'м</strong></div>';
                html += '<div class="metric"><p>📈 Средние</p><strong style="font-size:22px;color:#a855f7">' + sgAvgViewers + '</strong></div>';
                html += '<div class="metric"><p>🔥 Пик</p><strong style="font-size:22px;color:#a855f7">' + maxPeakViewers + '</strong></div>';
                html += '<div class="metric"><p>👁 Время просмотра</p><strong style="font-size:22px">' + Math.floor(totalWatchTime / 60) + 'ч ' + (totalWatchTime % 60) + 'м</strong></div>';
                html += '<div class="metric"><p>📊 Новые фоловеры</p><strong style="font-size:22px">' + totalFollowers + '</strong></div>';
                if (allGames.size) html += '<div class="metric" style="grid-column:1/-1"><p>🎮 Игры</p><strong style="font-size:14px">' + [...allGames].join(', ') + '</strong></div>';
                html += '</div>';
            } else {
                html += '<h3 style="font-size:16px;margin-bottom:12px">📊 SullyGnome</h3>';
                html += '<p class="muted" style="margin-bottom:24px">Нет импортированных данных</p>';
            }

            html += '<p class="muted" style="font-size:12px">Данные обновлены: ' + new Date().toLocaleString('ru-RU') + '</p>';
            html += '</div>';
            container.innerHTML = html;
        }).catch(e => {
            container.innerHTML = '<p class="muted" style="padding:20px;text-align:center">❌ Ошибка: ' + e.message + '</p>';
